version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: redesociales_ia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: redesociales_ia
    ports:
      - '5432:5432'
    volumes:
      - pgdata_redesociales_ia:/var/lib/postgresql/data

volumes:
  pgdata_redesociales_ia:
